<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissor</title>
</head>
<body>
  <p>Rock Paper Scissor</p>
  <button onclick="playGame('Rock')">
  Rock
</button>
  <button onclick="playGame('Paper')">
    Paper
  </button>
  <button onclick="playGame('Scissor')">
    Scissor
  </button>
  <button onclick="score.Win=0;score.Loss=0;score.Tie=0;
  localStorage.removeItem('score');
  alert('Score reset successful');">
    Reset Score
  </button>
  <script>
    //used for normal variable method
    /*const score = {
     Win:0,
     Loss:0,
     Tie:0
    }*/
    //console.log(localStorage.getItem('message'));
    //local storage method
    let score=JSON.parse(localStorage.getItem('score')) ||{
      Win:0,
      Loss:0,
      Tie:0
    };
    //if(score===null){
    /*if(!score){
      score={
        Win:0,
        Loss:0,
        Tie:0
      };
    }*/
    // let compMove='';---> if return not used then to resolve scope problem
    //if return used
  function pickCompMove(){
    let compMove='';
  const random=Math.random();
  if(random>=0 && random<1/3)
      compMove='Rock';
    else if(random>=1/3 && random<2/3)
      compMove='Paper';
    else if(random>=2/3 && random<1) 
      compMove='Scissor';
    return compMove;
}
function playGame(playerMove){
  const compMove=pickCompMove();
    let result='';
    if(playerMove==='Scissor')
      {
        if(compMove==='Rock')
        result='You lose';
        else if(compMove==='Paper')
        result='You win';
        else if(compMove==='Scissor')
        result='Tie';
      }
     else if(playerMove==='Rock') 
     {
      if(compMove==='Rock')
        result='Tie';
        else if(compMove==='Paper')
        result='You lose';
        else if(compMove==='Scissor')
        result='You win';
     }
     else {
      if(compMove==='Rock')
        result='You win';
        else if(compMove==='Paper')
        result='Tie';
        else if(compMove==='Scissor')
        result='You lose';
     }


     if(result==='You win'){
        score.Win+=1}
     else if(result==='You lose'){
      score.Loss+=1;}
     else{
     score.Tie+=1;}

     localStorage.setItem('score',JSON.stringify(score));//JSON.stringify(score));

alert(`Computer Move: ${compMove}
Your Move:${playerMove} 
Result:${result}
Wins: ${score.Win},Losses: ${score.Loss}, Ties: ${score.Tie}`);
}
  </script>
</body>
</html>
